<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#047036" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#024a23" media="(prefers-color-scheme: dark)" />

    <!-- Primary Meta Tags -->
    <title>Parsanol - Parser Combinator Library for Rust and Ruby</title>
    <meta name="title" content="Parsanol - Parser Combinator Library for Rust and Ruby" />
    <meta name="description" content="Parsanol is a powerful, composable parser combinator library for Rust and Ruby. Build complex parsers from simple, reusable components with great error reporting." />
    <meta name="author" content="Parsanol Team" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://parsanol.github.io/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://parsanol.github.io/" />
    <meta property="og:title" content="Parsanol - Parser Combinator Library for Rust and Ruby" />
    <meta property="og:description" content="Build complex parsers from simple, reusable components. Supports Rust and Ruby with multi-language code examples." />
    <meta property="og:image" content="https://parsanol.github.io/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://parsanol.github.io/" />
    <meta property="twitter:title" content="Parsanol - Parser Combinator Library" />
    <meta property="twitter:description" content="Build complex parsers from simple, reusable components. Supports Rust and Ruby." />
    <meta property="twitter:image" content="https://parsanol.github.io/og-image.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Parsanol",
        "description": "A parser combinator library for Rust and Ruby",
        "url": "https://parsanol.github.io",
        "applicationCategory": "DeveloperApplication",
        "programmingLanguage": ["Rust", "Ruby"],
        "license": "https://opensource.org/licenses/MIT"
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <!-- Handle SPA redirect from 404.html -->
    <script>
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect != location.href) {
          history.replaceState(null, null, redirect);
        }
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
