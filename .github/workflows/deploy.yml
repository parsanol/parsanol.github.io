name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'package.json'
      - '.github/workflows/deploy.yml'
  # Trigger on changes to parsanol-rs (via repository_dispatch)
  repository_dispatch:
    types: [parsanol-rs-update]
  # Weekly rebuild to keep docs fresh
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM UTC
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual deployment'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website
        uses: actions/checkout@v4

      - name: Checkout parsanol-rs
        uses: actions/checkout@v4
        with:
          repository: parsanol/parsanol-rs
          path: parsanol-rs
          sparse-checkout: |
            examples
            Cargo.toml
            benches
            docs
          sparse-checkout-cone-mode: false

      - name: Checkout parsanol-ruby
        uses: actions/checkout@v4
        with:
          repository: parsanol/parsanol-ruby
          path: parsanol-ruby
          sparse-checkout: |
            example
          sparse-checkout-cone-mode: false

      - name: Extract parsanol-rs version
        id: version
        run: |
          VERSION=$(grep -m1 'version\s*=' parsanol-rs/Cargo.toml | sed 's/.*version\s*=\s*"\([^"]*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Parsanol version: $VERSION"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PARSANOL_RS_DIR: ./parsanol-rs
          PARSANOL_RUBY_DIR: ./parsanol-ruby
          PARSANOL_VERSION: ${{ steps.version.outputs.version }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
