name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
    # Trigger on changes to example files in parsanol-rs or parsanol-ruby
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout parsanol-rs
        uses: actions/checkout@v4
        with:
          repository: parsanol/parsanol-rs
          path: parsanol-rs
          sparse-checkout: |
            examples
          sparse-checkout-cone-mode: false

      - name: Checkout parsanol-ruby
        uses: actions/checkout@v4
        with:
          repository: parsanol/parsanol-ruby
          path: parsanol-ruby
          sparse-checkout: |
            example
          sparse-checkout-cone-mode: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PARSANOL_RS_DIR: ./parsanol-rs
          PARSANOL_RUBY_DIR: ./parsanol-ruby

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
